name: Sync Media Feeds

on:
  workflow_dispatch:
  schedule:
    # Daily at 13:30 UTC (early morning US Pacific).
    - cron: "30 13 * * *"

permissions:
  contents: write

concurrency:
  group: sync-media
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          corepack enable
          yarn install --frozen-lockfile

      - name: Sync AlbumWhale and BookWyrm
        run: |
          yarn sync:albumwhale
          yarn sync:bookwyrm

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/listening-albums src/assets/listening-images src/reading-books src/assets/reading-images
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Sync media posts from AlbumWhale and BookWyrm"
          git push origin HEAD:main
